<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header(~{})}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5 flex-fill">
    <h1 class="mb-4">Commodity List</h1>

    <form th:action="@{/commodity}" method="get" class="mb-4 d-flex">
        <input type="text" name="query" class="form-control me-2" placeholder="Search by code or description">
        <button type="submit" class="btn btn-outline-primary">Search</button>
    </form>

    <div class="table-responsive rounded">
        <table class="table table-bordered table-striped align-middle">
            <thead th:class="${@authService.isAdmin()} ? 'table-danger' : 'table-success'">
            <tr>
            <tr>
                <th>Code</th>
                <th>Description</th>
                <th style="width: 80px;"></th>
                <th style="width: 80px;" th:if="${@authService.isAdmin()}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="commodity : ${commodities}">
                <td th:text="${commodity.commodityCode}">Code</td>
                <td th:text="${commodity.description}">Description</td>
                <td class="text-center">
                    <form th:action="|/commodity/${commodity.commodityId}/edit|" method="get" class="d-inline">
                        <button type="submit" class="btn btn-primary btn-sm">Edit</button>
                    </form>
                </td>
                <td class="text-center" th:if="${@authService.isAdmin()}">
                    <form class="d-inline" method="get" th:action="|/commodity/${commodity.commodityId}/delete|">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(commodities)}">
                <td colspan="5" class="text-center text-muted">No commodities found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 0}" class="d-flex flex-column align-items-center mt-3">
        <nav th:if="${totalPages > 1}" aria-label="Commodity pagination">
            <ul class="pagination mb-1">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <button type="button" class="page-link" th:onclick="|goToPage(${currentPage - 1})|">&laquo;</button>
                </li>
                <li th:if="${startPage > 0}" class="page-item">
                    <button type="button" class="page-link" th:onclick="goToPage(0)">1</button>
                </li>
                <li th:if="${startPage > 1}" class="page-item disabled">
                    <span class="page-link">…</span>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <button type="button" class="page-link" th:onclick="|goToPage(${i})|" th:text="${i + 1}"></button>
                </li>
                <li th:if="${endPage < totalPages - 2}" class="page-item disabled">
                    <span class="page-link">…</span>
                </li>
                <li th:if="${endPage < totalPages - 1}" class="page-item">
                    <button type="button" class="page-link" th:onclick="|goToPage(${totalPages - 1})|"
                            th:text="${totalPages}"></button>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <button type="button" class="page-link" th:onclick="|goToPage(${currentPage + 1})|">&raquo;</button>
                </li>
            </ul>
        </nav>
        <small class="text-muted" th:text="|Page ${currentPage + 1} of ${totalPages}|"></small>
    </div>

    <form th:action="@{/home}" method="get" class="mt-4">
        <button type="submit" class="btn btn-secondary">Back</button>
    </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const goToPage = (page) => {
        const params = new URLSearchParams(window.location.search);
        params.set('page', page);
        window.location.href = `/commodity?${params.toString()}`;
    };
</script>

</body>
</html>
